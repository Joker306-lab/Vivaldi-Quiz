<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antonio Vivaldi Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">Antonio Vivaldi Quiz</div>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Timer</span>
          <span id="timer" class="stat-value timer">20</span>
        </div>

        <div class="stat">
          <span class="stat-label">Score</span>
          <span id="score" class="stat-value">0</span>
        </div>

        <div class="stat">
          <span class="stat-label">Highscore</span>
          <span id="highscore" class="stat-value">0</span>
        </div>
      </div>
    </header>

    <main class="quiz-card">
      <div class="quiz-head">
        <div id="progress" class="progress">Frage 1</div>
        <button id="joker" class="joker-btn" type="button">Joker</button>
      </div>

      <h1 id="question" class="question">Lade Frage...</h1>

      <div id="answers" class="answers"></div>

      <div id="feedback" class="feedback"></div>

      <button id="restart" class="restart-btn hidden" type="button">Nochmal spielen</button>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
